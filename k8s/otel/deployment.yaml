apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel
          image: otel/opentelemetry-collector-contrib:0.92.0
          args: ["--config=/conf/otel.yaml"]
          ports:
            - containerPort: 4317
            - containerPort: 4318
          volumeMounts:
            - name: otel-config-volume
              mountPath: /conf
      volumes:
        - name: otel-config-volume
          configMap:
            name: otel-config
